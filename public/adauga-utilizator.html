<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adaugă Utilizator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card shadow p-4" style="width: 100%; max-width: 400px;">
        <h3 class="text-center mb-4">Creare Cont Nou</h3>
        
        <form id="formularInregistrare">
            <div class="mb-3">
                <label for="emailNou" class="form-label">Email Utilizator Nou</label>
                <input type="email" class="form-control" id="emailNou" required>
            </div>
            
            <div class="mb-3">
                <label for="parolaNoua" class="form-label">Parolă Temporară</label>
                <input type="text" class="form-control" id="parolaNoua" required>
            </div>
            
            <div id="mesajStatus" class="mb-3 fw-bold text-center"></div>

            <button type="submit" class="btn btn-success w-100 mb-2">Salvează Utilizatorul</button>
            <a href="/login.html" class="btn btn-outline-secondary w-100">Înapoi la login</a>
        </form>
    </div>

    <script>
        document.getElementById('formularInregistrare').addEventListener('submit', async (eveniment) => {
            eveniment.preventDefault(); 
            
            const email = document.getElementById('emailNou').value;
            const parola = document.getElementById('parolaNoua').value;
            const mesajStatus = document.getElementById('mesajStatus');
            
            mesajStatus.className = "mb-3 fw-bold text-center text-dark";
            mesajStatus.innerText = "Se procesează...";

            try {
                const raspuns = await fetch('/api/inregistrare', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, parola })
                });

                const date = await raspuns.json();

                if (raspuns.ok) {
                    mesajStatus.classList.add('text-success');
                    mesajStatus.innerText = date.mesaj; // "Utilizatorul a fost creat cu succes!"
                    document.getElementById('formularInregistrare').reset(); // Curățăm formularul
                } else {
                    mesajStatus.classList.add('text-danger');
                    mesajStatus.innerText = date.mesaj; // Ex: "Acest email există deja"
                }
            } catch (eroare) {
                console.error("Eroare:", eroare);
                mesajStatus.classList.add('text-danger');
                mesajStatus.innerText = "Eroare de conexiune.";
            }
        });
    </script>
</body>
</html>
