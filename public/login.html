<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autentificare - Tracker Proiecte</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card shadow p-4" style="width: 100%; max-width: 400px;">
        <h3 class="text-center mb-4">Autentificare</h3>
        
        <form id="formularLogin">
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" required>
            </div>
            
            <div class="mb-3">
                <label for="parola" class="form-label">Parolă</label>
                <input type="password" class="form-control" id="parola" required>
            </div>
            
            <div id="mesajEroare" class="text-danger mb-3 d-none">
                <small>Email sau parolă incorectă.</small>
            </div>

            <button type="submit" class="btn btn-primary w-100" style="margin-bottom: 15px;">Loghează-te</button>
    <a href="/adauga-utilizator.html" class="btn btn-outline-secondary w-100">Creează un cont nou</a>
        </form>
    </div>

    <script>
        document.getElementById('formularLogin').addEventListener('submit', async (eveniment) => {
            eveniment.preventDefault(); 
            
            const email = document.getElementById('email').value;
            const parola = document.getElementById('parola').value;
            const mesajEroare = document.getElementById('mesajEroare');
            
            mesajEroare.classList.add('d-none');

            try {
                const raspuns = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, parola })
                });

                const date = await raspuns.json();

                if (raspuns.ok) {
                    localStorage.setItem('tokenAuth', date.token);
                    window.location.href = '/index.html';
                } else {
                    mesajEroare.classList.remove('d-none');
                }
            } catch (eroare) {
                console.error("Eroare de conexiune:", eroare);
                alert("Nu m-am putut conecta la server.");
            }
        });
    </script>
</body>
</html>
